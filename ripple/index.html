<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ripple — Fluid Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; background: #241200; touch-action: none; }
canvas { width: 100vw; height: 100vh; display: block; }

.ui-panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
    opacity: 1;
    transition: opacity 0.4s ease;
}
.ui-panel.faded { opacity: 0.15; }
.ui-panel.faded:hover { opacity: 1; }

.ui-btn {
    background: rgba(36, 18, 0, 0.8);
    border: 1px solid rgba(221, 193, 101, 0.3);
    color: #DDC165;
    font: 12px/1 -apple-system, sans-serif;
    padding: 10px 16px;
    border-radius: 24px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}
.ui-btn:hover {
    background: rgba(221, 193, 101, 0.15);
    border-color: rgba(221, 193, 101, 0.6);
}
.ui-btn.active {
    background: rgba(229, 89, 28, 0.3);
    border-color: #E5591C;
    color: #FFE9A3;
}
.ui-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E5591C;
    animation: pulse-dot 1s ease infinite;
}
@keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.title-overlay {
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 10;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: none;
}
.title-overlay.faded { opacity: 0; }
.title-overlay h1 {
    font: 300 28px/1 'Helvetica Neue', sans-serif;
    color: #DDC165;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(229, 89, 28, 0.4);
}
.title-overlay p {
    font: 11px/1.4 -apple-system, sans-serif;
    color: rgba(221, 193, 101, 0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.settings-panel {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100vh;
    background: rgba(26, 13, 0, 0.95);
    border-left: 1px solid rgba(221, 193, 101, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 20;
    padding: 24px 20px;
    overflow-y: auto;
    transition: right 0.3s ease;
    color: #DDC165;
    font: 12px/1.6 -apple-system, sans-serif;
}
.settings-panel.open { right: 0; }
.settings-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(221, 193, 101, 0.5);
    margin: 20px 0 10px;
}
.settings-panel h3:first-child { margin-top: 0; }
.setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.setting-row label { font-size: 12px; color: #DDC165; }
.setting-row .val { color: rgba(221, 193, 101, 0.5); font-variant-numeric: tabular-nums; font-size: 11px; }
input[type="range"] {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(221, 193, 101, 0.15);
    border-radius: 2px;
    outline: none;
    margin: 4px 0 12px;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #DDC165;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(221, 193, 101, 0.4);
}
select {
    width: 100%;
    background: rgba(221, 193, 101, 0.1);
    color: #DDC165;
    border: 1px solid rgba(221, 193, 101, 0.2);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
    margin-bottom: 12px;
}
.close-settings {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: rgba(221, 193, 101, 0.5);
    font-size: 20px;
    cursor: pointer;
}

.record-indicator {
    position: fixed;
    top: 20px;
    right: 24px;
    display: none;
    align-items: center;
    gap: 8px;
    color: #E5591C;
    font: 500 12px/1 -apple-system, sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 15;
}
.record-indicator.visible { display: flex; }
.record-indicator .rec-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #E5591C;
    animation: pulse-dot 1s ease infinite;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="title-overlay" id="titleOverlay">
    <h1>Ripple</h1>
    <p>Touch to create · Auto-pilot active</p>
</div>

<div class="record-indicator" id="recIndicator">
    <span class="rec-dot"></span>
    <span id="recTime">00:00</span>
</div>

<div class="ui-panel" id="uiPanel">
    <button class="ui-btn active" id="btnAutopilot">Auto</button>
    <button class="ui-btn" id="btnRecord">Record</button>
    <button class="ui-btn" id="btnPalette">Palette</button>
    <button class="ui-btn" id="btnSettings">Settings</button>
</div>

<div class="settings-panel" id="settingsPanel">
    <button class="close-settings" id="closeSettings">&times;</button>

    <h3>Simulation</h3>
    <div class="setting-row">
        <label>Viscosity</label>
        <span class="val" id="viscVal">0.3</span>
    </div>
    <input type="range" id="viscosity" min="0" max="5" step="0.1" value="0.3">

    <div class="setting-row">
        <label>Curl</label>
        <span class="val" id="curlVal">30</span>
    </div>
    <input type="range" id="curl" min="0" max="50" step="1" value="30">

    <div class="setting-row">
        <label>Pressure</label>
        <span class="val" id="pressVal">20</span>
    </div>
    <input type="range" id="pressure" min="1" max="60" step="1" value="20">

    <div class="setting-row">
        <label>Splat Radius</label>
        <span class="val" id="splatVal">0.25</span>
    </div>
    <input type="range" id="splatRadius" min="0.05" max="1.0" step="0.01" value="0.25">

    <div class="setting-row">
        <label>Force</label>
        <span class="val" id="forceVal">6000</span>
    </div>
    <input type="range" id="splatForce" min="500" max="15000" step="100" value="6000">

    <div class="setting-row">
        <label>Dissipation</label>
        <span class="val" id="dissVal">0.97</span>
    </div>
    <input type="range" id="dissipation" min="0.90" max="1.00" step="0.005" value="0.97">

    <h3>Visual</h3>
    <div class="setting-row">
        <label>Bloom</label>
        <span class="val" id="bloomVal">0.5</span>
    </div>
    <input type="range" id="bloomIntensity" min="0" max="1.5" step="0.05" value="0.5">

    <div class="setting-row">
        <label>Bloom Threshold</label>
        <span class="val" id="bloomThreshVal">0.5</span>
    </div>
    <input type="range" id="bloomThreshold" min="0.1" max="1.5" step="0.05" value="0.5">

    <h3>Recording</h3>
    <div class="setting-row">
        <label>Duration (sec)</label>
        <span class="val" id="durVal">10</span>
    </div>
    <input type="range" id="recDuration" min="3" max="30" step="1" value="10">

    <div class="setting-row">
        <label>Resolution</label>
    </div>
    <select id="recResolution">
        <option value="1">1x (performance)</option>
        <option value="2" selected>2x (quality)</option>
    </select>
</div>

<script src="ripple.js"></script>
</body>
</html>
