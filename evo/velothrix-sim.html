<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velothrix aurantis — Ecosystem Observation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<style>
:root {
  --bg: #241200;
  --bg-dark: #1A0D00;
  --gold: #DDC165;
  --gold-light: #FFE9A3;
  --orange: #E5591C;
  --text: #e8d5c0;
  --dim: #8a7560;
  --card: #2a1800;
  --card-hover: #331e00;
  --border: #3d2a10;
  --velothrix: #DDC165;
  --leviathan: #C0392B;
  --crawler: #2ECC71;
  --crab: #E5591C;
  --worm: #9B59B6;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOADING SCREEN ── */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  gap: 20px;
}
#loader h1 {
  font-family: var(--sans);
  font-size: 28px; font-weight: 800;
  color: var(--gold);
}
#loader p {
  color: var(--dim);
  font-size: 13px;
}
.loader-bar {
  width: 200px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%; width: 0%;
  background: var(--gold);
  transition: width 0.3s;
}

/* ── LAYOUT ── */
#app {
  display: none;
  height: 100vh;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr auto;
}

/* ── HEADER ── */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
#header h1 {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
  white-space: nowrap;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-controls button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
}
.header-controls button:hover { background: var(--card-hover); }
.header-controls button.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}
#gen-counter {
  color: var(--dim);
  font-size: 11px;
  margin-left: auto;
  white-space: nowrap;
}
#gen-counter span { color: var(--gold-light); }

/* ── SPECIES TABS ── */
.species-tabs {
  display: flex;
  gap: 2px;
  margin-left: 16px;
}
.species-tab {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
}
.species-tab:hover { color: var(--text); }
.species-tab.active {
  border-color: var(--gold);
  color: var(--gold);
}

/* ── MAP AREA ── */
#map-area {
  position: relative;
  overflow: hidden;
  background: var(--bg-dark);
}
#map-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── EVENT FEED OVERLAY ── */
#event-feed {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  max-height: 120px;
  overflow-y: auto;
  background: linear-gradient(transparent, rgba(26,13,0,0.95));
  padding: 40px 12px 8px;
  pointer-events: none;
}
#event-feed div {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
  pointer-events: auto;
}
#event-feed div .ev-gen { color: var(--gold); }
#event-feed div .ev-text { color: var(--text); }

/* ── RIGHT PANEL ── */
#panel {
  background: var(--bg-dark);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
}
.panel-section h3 {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panel-toggle {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}
.panel-toggle button {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 6px;
  cursor: pointer;
  border-radius: 2px;
}
.panel-toggle button.active {
  background: var(--card-hover);
  color: var(--gold);
  border-color: var(--gold);
}

/* ── SPECIES ROWS ── */
.species-row {
  display: flex;
  align-items: center;
  padding: 4px 0;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.species-row:last-child { border-bottom: none; }
.sp-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sp-name {
  flex: 1;
  font-size: 10px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sp-pop {
  font-size: 10px;
  color: var(--dim);
  text-align: right;
  min-width: 40px;
}
.sp-trait {
  font-size: 10px;
  color: var(--gold);
  text-align: right;
  min-width: 40px;
}

/* ── CHART CANVASES ── */
.chart-canvas {
  width: 100%;
  height: 120px;
  display: block;
}
.chart-canvas.tall {
  height: 160px;
}

/* ── EVENT LOG ── */
#event-log {
  grid-column: 1 / -1;
  background: var(--bg-dark);
  border-top: 1px solid var(--border);
  max-height: 140px;
  overflow-y: auto;
  padding: 6px 12px;
}
#event-log .log-entry {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
}
#event-log .log-entry .ev-gen { color: var(--gold); }
#event-log .log-entry .ev-text { color: var(--text); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>VELOTHRIX</h1>
  <p>Loading Pyodide runtime...</p>
  <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <h1>VELOTHRIX</h1>
    <div class="species-tabs" id="species-tabs"></div>
    <div class="header-controls">
      <button id="btn-play" onclick="togglePlay()">&#9654; Play</button>
      <button onclick="setSpeed(1)" class="speed-btn active" data-speed="1">1x</button>
      <button onclick="setSpeed(5)" class="speed-btn" data-speed="5">5x</button>
      <button onclick="setSpeed(20)" class="speed-btn" data-speed="20">20x</button>
      <button onclick="setSpeed(100)" class="speed-btn" data-speed="100">100x</button>
    </div>
    <div id="gen-counter">Gen <span id="gen-num">0</span></div>
  </div>

  <!-- MAP -->
  <div id="map-area">
    <canvas id="map-canvas"></canvas>
    <div id="event-feed"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="panel">
    <div class="panel-section">
      <h3 id="panel-title">Global Overview</h3>
      <div class="panel-toggle">
        <button class="active" onclick="setPanelMode('global')">Global</button>
        <button onclick="setPanelMode('tile')">Selected Tile</button>
      </div>
      <div id="species-list"></div>
    </div>

    <div class="panel-section">
      <h3>Population Trends</h3>
      <canvas class="chart-canvas tall" id="pop-chart"></canvas>
    </div>

    <div class="panel-section">
      <h3 id="trait-title">Trait Distribution</h3>
      <canvas class="chart-canvas" id="trait-chart"></canvas>
    </div>
  </div>

  <!-- EVENT LOG -->
  <div id="event-log">
    <div class="log-entry"><span class="ev-gen">[System]</span> <span class="ev-text">Ecosystem initializing...</span></div>
  </div>
</div>

<script>
// ── GLOBALS ──
let pyodide = null;
let playing = false;
let speed = 1;
let selectedSpecies = 0; // index into SPECIES
let panelMode = 'global';
let selectedTile = null; // {r, c} or null
let popHistory = []; // [{gen, pops: [5 numbers]}]
let mapCanvas, mapCtx;
let popCanvas, popCtx;
let traitCanvas, traitCtx;
let animFrame = null;
let stepsPerFrame = 1;

const SPECIES = [
  { name: 'Velothrix', fullName: 'Velothrix aurantis', color: '#DDC165', trait: 'Crest Brightness' },
  { name: 'Leviathan', fullName: 'Kelp Leviathan', color: '#C0392B', trait: 'Hunting Range' },
  { name: 'Crawler', fullName: 'Reed Crawler', color: '#2ECC71', trait: 'Burrowing Depth' },
  { name: 'Crab', fullName: 'Tidal Crab', color: '#E5591C', trait: 'Shell Thickness' },
  { name: 'Worm', fullName: 'Bioluminescent Worm', color: '#9B59B6', trait: 'Glow Intensity' }
];

const MAX_HISTORY = 200;

// ── INIT ──
async function init() {
  const fill = document.getElementById('loader-fill');
  fill.style.width = '20%';

  pyodide = await loadPyodide();
  fill.style.width = '50%';

  await pyodide.runPythonAsync(SIM_CODE);
  fill.style.width = '80%';

  setupUI();
  fill.style.width = '100%';

  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    resizeCanvases();
    renderAll();
  }, 300);
}

function setupUI() {
  // Species tabs
  const tabsEl = document.getElementById('species-tabs');
  SPECIES.forEach((sp, i) => {
    const btn = document.createElement('button');
    btn.className = 'species-tab' + (i === 0 ? ' active' : '');
    btn.textContent = sp.name;
    btn.style.borderColor = i === selectedSpecies ? sp.color : '';
    btn.onclick = () => selectSpecies(i);
    tabsEl.appendChild(btn);
  });

  // Canvases
  mapCanvas = document.getElementById('map-canvas');
  mapCtx = mapCanvas.getContext('2d');
  popCanvas = document.getElementById('pop-chart');
  popCtx = popCanvas.getContext('2d');
  traitCanvas = document.getElementById('trait-chart');
  traitCtx = traitCanvas.getContext('2d');

  mapCanvas.addEventListener('click', onMapClick);
  window.addEventListener('resize', () => { resizeCanvases(); renderAll(); });
}

function resizeCanvases() {
  const mapArea = document.getElementById('map-area');
  mapCanvas.width = mapArea.clientWidth;
  mapCanvas.height = mapArea.clientHeight;

  const dpr = window.devicePixelRatio || 1;
  for (const c of [popCanvas, traitCanvas]) {
    c.width = c.clientWidth * dpr;
    c.height = c.clientHeight * dpr;
    c.getContext('2d').scale(dpr, dpr);
  }
}

// ── SPECIES SELECTION ──
function selectSpecies(i) {
  selectedSpecies = i;
  document.querySelectorAll('.species-tab').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === i);
    btn.style.borderColor = idx === i ? SPECIES[i].color : '';
  });
  document.getElementById('trait-title').textContent = SPECIES[i].trait + ' Distribution';
  renderAll();
}

// ── PANEL MODE ──
function setPanelMode(mode) {
  panelMode = mode;
  document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
    btn.classList.toggle('active', (mode === 'global' && idx === 0) || (mode === 'tile' && idx === 1));
  });
  if (mode === 'global') {
    selectedTile = null;
    document.getElementById('panel-title').textContent = 'Global Overview';
  } else if (!selectedTile) {
    document.getElementById('panel-title').textContent = 'Click a tile';
  }
  renderAll();
}

// ── MAP CLICK ──
function onMapClick(e) {
  const rect = mapCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const gridSize = pyodide.runPython('GRID_SIZE');
  const tileW = mapCanvas.width / gridSize;
  const tileH = mapCanvas.height / gridSize;

  const c = Math.floor(x / tileW);
  const r = Math.floor(y / tileH);

  if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
    selectedTile = { r, c };
    panelMode = 'tile';
    document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
      btn.classList.toggle('active', idx === 1);
    });
    document.getElementById('panel-title').textContent = `Tile (${r}, ${c})`;
    renderAll();
  }
}

// ── PLAY / SPEED ──
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) tick();
}

function setSpeed(s) {
  speed = s;
  stepsPerFrame = s >= 20 ? s / 5 : 1;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.speed) === s);
  });
}

// ── SIM TICK ──
function tick() {
  if (!playing) return;

  const steps = Math.max(1, Math.floor(stepsPerFrame));
  for (let i = 0; i < steps; i++) {
    pyodide.runPython('step()');
  }

  // Get state
  const gen = pyodide.runPython('generation');
  document.getElementById('gen-num').textContent = gen.toLocaleString();

  // Collect global populations for history
  const globalPops = [];
  for (let s = 0; s < 5; s++) {
    globalPops.push(pyodide.runPython(`get_global_pop(${s})`));
  }
  popHistory.push({ gen, pops: globalPops });
  if (popHistory.length > MAX_HISTORY) popHistory.shift();

  // Check events
  const eventsJson = pyodide.runPython('get_and_clear_events()');
  const events = JSON.parse(eventsJson);
  if (events.length > 0) {
    const feed = document.getElementById('event-feed');
    const log = document.getElementById('event-log');
    events.forEach(ev => {
      const feedDiv = document.createElement('div');
      feedDiv.innerHTML = `<span class="ev-gen">[Gen ${ev.gen}]</span> <span class="ev-text">${ev.text}</span>`;
      feed.appendChild(feedDiv);

      const logDiv = document.createElement('div');
      logDiv.className = 'log-entry';
      logDiv.innerHTML = feedDiv.innerHTML;
      log.appendChild(logDiv);
    });
    // Keep feed short
    while (feed.children.length > 20) feed.removeChild(feed.firstChild);
    log.scrollTop = log.scrollHeight;
    feed.scrollTop = feed.scrollHeight;
  }

  renderAll();

  if (speed <= 5) {
    animFrame = requestAnimationFrame(tick);
  } else {
    animFrame = setTimeout(tick, 16);
  }
}

// ── RENDER ALL ──
function renderAll() {
  renderMap();
  renderSpeciesList();
  renderPopChart();
  renderTraitChart();
}

// ── RENDER MAP ──
function renderMap() {
  const gs = pyodide.runPython('GRID_SIZE');
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const tw = w / gs;
  const th = h / gs;

  mapCtx.fillStyle = '#1A0D00';
  mapCtx.fillRect(0, 0, w, h);

  const si = selectedSpecies;
  const color = SPECIES[si].color;

  // Get density data
  const dataJson = pyodide.runPython(`get_map_data(${si})`);
  const data = JSON.parse(dataJson);

  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const pop = data.pops[r][c];
      const elev = data.elevations[r][c];
      const maxPop = data.max_pop || 1;

      // Base tile color from elevation
      const baseR = 26 + elev * 20;
      const baseG = 13 + elev * 15;
      const baseB = 0 + elev * 8;

      const x = c * tw;
      const y = r * th;

      // Draw base
      mapCtx.fillStyle = `rgb(${baseR|0},${baseG|0},${baseB|0})`;
      mapCtx.fillRect(x, y, tw - 1, th - 1);

      // Draw species density overlay
      if (pop > 0) {
        const intensity = Math.min(1, pop / (maxPop * 0.7));
        const rgb = hexToRgb(color);
        mapCtx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${intensity * 0.8})`;
        mapCtx.fillRect(x, y, tw - 1, th - 1);
      }

      // Selected tile highlight
      if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
        mapCtx.strokeStyle = '#FFE9A3';
        mapCtx.lineWidth = 2;
        mapCtx.strokeRect(x + 1, y + 1, tw - 3, th - 3);
      }
    }
  }

  // Draw grid lines (very subtle)
  mapCtx.strokeStyle = 'rgba(61,42,16,0.3)';
  mapCtx.lineWidth = 0.5;
  for (let i = 0; i <= gs; i++) {
    mapCtx.beginPath();
    mapCtx.moveTo(i * tw, 0);
    mapCtx.lineTo(i * tw, h);
    mapCtx.stroke();
    mapCtx.beginPath();
    mapCtx.moveTo(0, i * th);
    mapCtx.lineTo(w, i * th);
    mapCtx.stroke();
  }
}

// ── RENDER SPECIES LIST ──
function renderSpeciesList() {
  const listEl = document.getElementById('species-list');
  let html = '';

  if (panelMode === 'global') {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_global_pop(${s})`);
      const trait = pyodide.runPython(`get_global_trait(${s})`);
      html += `<div class="species-row">
        <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
        <div class="sp-name">${SPECIES[s].fullName}</div>
        <div class="sp-pop">${pop}</div>
        <div class="sp-trait">${trait.toFixed(3)}</div>
      </div>`;
    }
  } else if (selectedTile) {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_tile_pop(${selectedTile.r},${selectedTile.c},${s})`);
      const trait = pyodide.runPython(`get_tile_trait(${selectedTile.r},${selectedTile.c},${s})`);
      html += `<div class="species-row">
        <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
        <div class="sp-name">${SPECIES[s].name}</div>
        <div class="sp-pop">${pop}</div>
        <div class="sp-trait">${trait.toFixed(3)}</div>
      </div>`;
    }
  } else {
    html = '<div style="color:var(--dim);font-size:10px;">Click a tile on the map</div>';
  }

  listEl.innerHTML = html;
}

// ── RENDER POP CHART ──
function renderPopChart() {
  const ctx = popCtx;
  const w = popCanvas.clientWidth;
  const h = popCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  if (popHistory.length < 2) return;

  // Find max for scaling
  let maxPop = 1;
  popHistory.forEach(entry => {
    entry.pops.forEach(p => { if (p > maxPop) maxPop = p; });
  });

  const padL = 35;
  const padR = 5;
  const padT = 5;
  const padB = 15;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Y axis labels
  ctx.fillStyle = '#5a6a50';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(maxPop.toString(), padL - 4, padT + 9);
  ctx.fillText('0', padL - 4, h - padB);

  // X axis
  ctx.strokeStyle = '#3d2a10';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(padL, h - padB);
  ctx.lineTo(w - padR, h - padB);
  ctx.stroke();

  // Draw lines for each species
  for (let s = 0; s < 5; s++) {
    ctx.strokeStyle = SPECIES[s].color;
    ctx.lineWidth = s === selectedSpecies ? 2 : 1;
    ctx.globalAlpha = s === selectedSpecies ? 1 : 0.4;
    ctx.beginPath();

    for (let i = 0; i < popHistory.length; i++) {
      const x = padL + (i / (popHistory.length - 1)) * plotW;
      const y = padT + plotH - (popHistory[i].pops[s] / maxPop) * plotH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ── RENDER TRAIT CHART ──
function renderTraitChart() {
  const ctx = traitCtx;
  const w = traitCanvas.clientWidth;
  const h = traitCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  // Get histogram data from Python
  const histJson = pyodide.runPython(`get_trait_histogram(${selectedSpecies})`);
  const hist = JSON.parse(histJson);

  if (!hist || hist.length === 0) return;

  const padL = 25;
  const padR = 5;
  const padT = 5;
  const padB = 18;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const maxCount = Math.max(...hist.map(b => b.count), 1);
  const barW = plotW / hist.length;

  const rgb = hexToRgb(SPECIES[selectedSpecies].color);

  for (let i = 0; i < hist.length; i++) {
    const barH = (hist[i].count / maxCount) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - barH;

    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
    ctx.fillRect(x + 1, y, barW - 2, barH);
  }

  // X axis labels
  ctx.fillStyle = '#8a7560';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('0.0', padL, h - 2);
  ctx.fillText('0.5', padL + plotW / 2, h - 2);

}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);

// ── PYTHON SIM CODE ──
const SIM_CODE = `
import json
import math
import random

# ── CONFIG ──
GRID_SIZE = 8
NUM_SPECIES = 5

# Species indices
VELOTHRIX = 0
LEVIATHAN = 1
CRAWLER = 2
CRAB = 3
WORM = 4

# Carrying capacities per tile
BASE_K = [60, 15, 40, 35, 80]  # Velothrix, Leviathan, Crawler, Crab, Worm

# Growth rates (per generation, logistic)
GROWTH_RATES = [0.03, 0.015, 0.025, 0.02, 0.04]

# Mutation rate and step
MUTATION_RATE = 0.002
MUTATION_STEP = 0.01

# Drift strength (lower = less drift)
DRIFT_STRENGTH = 0.005

# Selection strength (how much trait affects fitness)
SELECTION_STRENGTH = 0.02

# Predation rates (fraction of prey eaten per predator per gen)
PREDATION_LEVIATHAN_VELOTHRIX = 0.003
PREDATION_LEVIATHAN_WORM = 0.002
PREDATION_VELOTHRIX_WORM = 0.001

# Competition coefficients
COMPETITION_VELOTHRIX_CRAWLER = 0.001
COMPETITION_CRAB_SPACE = 0.0005

# Migration rate (fraction that migrates per gen)
MIGRATION_RATE = 0.01

# Event probabilities per gen (very rare)
DROUGHT_PROB = 0.002
FLOOD_PROB = 0.002
DISEASE_PROB = 0.001

# Season cycle length
SEASON_LENGTH = 100

# Speciation tracking
SPECIATION_THRESHOLD = 0.3
SPECIATION_GENS = 100

# ── STATE ──
generation = 0
events_buffer = []

# Grid state: [row][col] -> tile
# Each tile: {
#   elevation: float 0-1,
#   food: float 0-1,
#   water: float 0-1,
#   temp: float 0-1,
#   pops: [5 ints],         # population per species
#   traits: [5 floats],     # mean trait per species (0-1)
#   trait_var: [5 floats],  # trait variance per species
# }

grid = []

def generate_elevation():
    """Simple value noise for terrain."""
    elev = [[0.0]*GRID_SIZE for _ in range(GRID_SIZE)]
    # Use midpoint displacement-like approach
    random.seed(42)  # Reproducible
    # Place some random control points
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            # Distance from center creates a basin (marsh in center, shores at edges)
            cx, cy = GRID_SIZE/2, GRID_SIZE/2
            dist = math.sqrt((r-cx)**2 + (c-cy)**2) / (GRID_SIZE * 0.7)
            base = 0.3 + dist * 0.5
            noise = random.uniform(-0.15, 0.15)
            elev[r][c] = max(0.0, min(1.0, base + noise))
    random.seed()  # Unseed
    return elev

def init_grid():
    global grid
    elevations = generate_elevation()
    grid = []
    for r in range(GRID_SIZE):
        row = []
        for c in range(GRID_SIZE):
            elev = elevations[r][c]
            # Habitat suitability based on elevation
            # Low elevation = deep water (leviathans), mid = marsh (velothrix), high = shore (crabs)
            tile = {
                'elevation': elev,
                'food': 0.7 + random.uniform(-0.1, 0.1),
                'water': max(0, 1.0 - elev + random.uniform(-0.1, 0.1)),
                'temp': 0.5 + random.uniform(-0.1, 0.1),
                'pops': [0]*NUM_SPECIES,
                'traits': [0.5]*NUM_SPECIES,
                'trait_var': [0.01]*NUM_SPECIES,
            }

            # Set initial populations based on habitat
            # Velothrix: prefer mid elevation (0.3-0.7)
            if 0.2 < elev < 0.8:
                tile['pops'][VELOTHRIX] = int(BASE_K[VELOTHRIX] * random.uniform(0.4, 0.7))
            else:
                tile['pops'][VELOTHRIX] = int(BASE_K[VELOTHRIX] * random.uniform(0.05, 0.2))

            # Leviathan: prefer low elevation (deep water)
            if elev < 0.5:
                tile['pops'][LEVIATHAN] = int(BASE_K[LEVIATHAN] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][LEVIATHAN] = int(BASE_K[LEVIATHAN] * random.uniform(0.0, 0.1))

            # Crawler: prefer mid-low (reeds)
            if 0.25 < elev < 0.65:
                tile['pops'][CRAWLER] = int(BASE_K[CRAWLER] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][CRAWLER] = int(BASE_K[CRAWLER] * random.uniform(0.05, 0.15))

            # Crab: prefer high elevation (shores)
            if elev > 0.5:
                tile['pops'][CRAB] = int(BASE_K[CRAB] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][CRAB] = int(BASE_K[CRAB] * random.uniform(0.0, 0.1))

            # Worm: everywhere, prefer wet
            water_factor = tile['water']
            tile['pops'][WORM] = int(BASE_K[WORM] * water_factor * random.uniform(0.3, 0.7))

            # Initial trait values with slight spatial variation
            for s in range(NUM_SPECIES):
                tile['traits'][s] = 0.5 + random.uniform(-0.05, 0.05)
                tile['trait_var'][s] = 0.01

            row.append(tile)
        grid.append(row)

init_grid()

def habitat_suitability(elev, species_idx):
    """Returns 0-1 suitability for species at given elevation."""
    if species_idx == VELOTHRIX:
        # Peak at 0.5
        return max(0, 1.0 - abs(elev - 0.5) * 2.5)
    elif species_idx == LEVIATHAN:
        # Prefer low (deep water)
        return max(0, 1.0 - elev * 1.8)
    elif species_idx == CRAWLER:
        # Peak at 0.4
        return max(0, 1.0 - abs(elev - 0.4) * 2.5)
    elif species_idx == CRAB:
        # Prefer high (shores)
        return max(0, elev * 1.5 - 0.2)
    elif species_idx == WORM:
        # Everywhere but slightly prefer wet
        return max(0.2, 1.0 - elev * 0.5)
    return 0.5

def get_season():
    """Returns season factor 0-1 (0=harsh winter, 1=peak summer)."""
    return 0.5 + 0.5 * math.sin(2 * math.pi * generation / SEASON_LENGTH)

def step():
    """Advance one generation."""
    global generation
    generation += 1
    season = get_season()

    # 1. Environment update
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            tile = grid[r][c]
            # Food regrows
            tile['food'] = min(1.0, tile['food'] + 0.01 * season)
            # Temperature seasonal
            tile['temp'] = 0.4 + 0.2 * season + random.uniform(-0.02, 0.02)

    # 2. Random events (very rare)
    _check_events(season)

    # 3. Per-tile, per-species dynamics
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            _update_tile(r, c, season)

    # 4. Migration
    _migrate()

    # 5. Speciation check (every 50 gens to save compute)
    if generation % 50 == 0:
        _check_speciation()

def _check_events(season):
    """Check for random environmental events."""
    if random.random() < DROUGHT_PROB:
        # Drought affects a region
        cr = random.randint(0, GRID_SIZE-1)
        cc = random.randint(0, GRID_SIZE-1)
        radius = random.randint(1, 2)
        for r in range(max(0,cr-radius), min(GRID_SIZE,cr+radius+1)):
            for c in range(max(0,cc-radius), min(GRID_SIZE,cc+radius+1)):
                grid[r][c]['food'] *= 0.4
                grid[r][c]['water'] *= 0.5
        region = "eastern" if cc > GRID_SIZE//2 else "western"
        events_buffer.append({
            'gen': generation,
            'text': f'Drought in {region} marsh — food and water levels dropping'
        })

    if random.random() < FLOOD_PROB:
        cr = random.randint(0, GRID_SIZE-1)
        cc = random.randint(0, GRID_SIZE-1)
        radius = random.randint(1, 2)
        for r in range(max(0,cr-radius), min(GRID_SIZE,cr+radius+1)):
            for c in range(max(0,cc-radius), min(GRID_SIZE,cc+radius+1)):
                grid[r][c]['water'] = min(1.0, grid[r][c]['water'] + 0.3)
                # Flooding hurts land species
                grid[r][c]['pops'][CRAB] = int(grid[r][c]['pops'][CRAB] * 0.7)
                grid[r][c]['pops'][CRAWLER] = int(grid[r][c]['pops'][CRAWLER] * 0.8)
        region = "northern" if cr < GRID_SIZE//2 else "southern"
        events_buffer.append({
            'gen': generation,
            'text': f'Flooding in {region} tidal flats — water levels surging'
        })

    if random.random() < DISEASE_PROB:
        target = random.randint(0, NUM_SPECIES-1)
        names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
        # Disease affects all tiles but mildly
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                grid[r][c]['pops'][target] = int(grid[r][c]['pops'][target] * 0.85)
        events_buffer.append({
            'gen': generation,
            'text': f'Disease outbreak affecting {names[target]} population'
        })

def _update_tile(r, c, season):
    """Update populations and traits for one tile."""
    tile = grid[r][c]
    elev = tile['elevation']

    for s in range(NUM_SPECIES):
        pop = tile['pops'][s]
        if pop <= 0:
            # Small chance of recolonization
            if random.random() < 0.001 * habitat_suitability(elev, s):
                tile['pops'][s] = 1
                tile['traits'][s] = 0.5 + random.uniform(-0.1, 0.1)
            continue

        trait = tile['traits'][s]
        trait_v = tile['trait_var'][s]

        # Effective carrying capacity depends on habitat and food
        suit = habitat_suitability(elev, s)
        k = BASE_K[s] * suit * tile['food'] * (0.7 + 0.3 * season)

        # ── SPECIES INTERACTIONS ──
        if s == VELOTHRIX:
            # Predation by Leviathans (brighter = more visible)
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = lev_pop * PREDATION_LEVIATHAN_VELOTHRIX * (0.5 + trait * 0.5)
            # Competition with crawlers
            craw_pop = tile['pops'][CRAWLER]
            comp_loss = craw_pop * COMPETITION_VELOTHRIX_CRAWLER
            k = max(1, k - comp_loss * 10)
            # Sexual selection: brighter = more mates (increases effective growth)
            sex_sel_bonus = trait * 0.01
            growth = GROWTH_RATES[s] + sex_sel_bonus
            # Net selection pressure on trait: sexual sel pushes UP, predation pushes DOWN
            sel_pressure = SELECTION_STRENGTH * (0.5 - trait) * 0.1  # mild stabilizing
            sel_pressure += SELECTION_STRENGTH * 0.3  # sexual selection pushes up
            if lev_pop > 0:
                sel_pressure -= SELECTION_STRENGTH * 0.5 * (lev_pop / max(1, BASE_K[LEVIATHAN]))
        elif s == LEVIATHAN:
            # Energy from prey
            vel_pop = tile['pops'][VELOTHRIX]
            worm_pop = tile['pops'][WORM]
            prey_available = vel_pop + worm_pop * 0.5
            # Hunting range: wider = more prey but more energy cost
            hunt_bonus = trait * 0.005 * prey_available / max(1, BASE_K[VELOTHRIX])
            energy_cost = trait * trait * 0.01
            growth = GROWTH_RATES[s] + hunt_bonus - energy_cost
            k = max(1, k * (0.5 + prey_available / max(1, BASE_K[VELOTHRIX] + BASE_K[WORM])))
            sel_pressure = 0
            if prey_available > BASE_K[VELOTHRIX] * 0.3:
                sel_pressure = SELECTION_STRENGTH * 0.2  # push range up when prey abundant
            else:
                sel_pressure = -SELECTION_STRENGTH * 0.2  # push range down when prey scarce
            predation_loss = 0
        elif s == CRAWLER:
            # Burrowing depth: deeper = safer but less food
            safety = trait * 0.8
            food_access = 1.0 - trait * 0.4
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = lev_pop * 0.001 * (1 - safety)
            growth = GROWTH_RATES[s] * food_access
            vel_pop = tile['pops'][VELOTHRIX]
            comp_loss = vel_pop * COMPETITION_VELOTHRIX_CRAWLER
            k = max(1, k * food_access - comp_loss * 5)
            sel_pressure = 0
            if lev_pop > BASE_K[LEVIATHAN] * 0.3:
                sel_pressure = SELECTION_STRENGTH * 0.2  # burrow deeper when predators present
            else:
                sel_pressure = -SELECTION_STRENGTH * 0.1  # come up for food when safe
        elif s == CRAB:
            # Shell thickness: thicker = armor but slow
            armor = trait * 0.7
            mobility = 1.0 - trait * 0.3
            growth = GROWTH_RATES[s] * mobility
            # Space competition
            total_pop = sum(tile['pops'])
            space_pressure = total_pop * COMPETITION_CRAB_SPACE
            k = max(1, k - space_pressure * 5)
            predation_loss = 0
            sel_pressure = SELECTION_STRENGTH * (0.5 - trait) * 0.1  # stabilizing
            if total_pop > sum(BASE_K) * 0.5:
                sel_pressure += SELECTION_STRENGTH * 0.15  # thicker shells when crowded
        elif s == WORM:
            # Glow: brighter = more mates but more predators
            vel_pop = tile['pops'][VELOTHRIX]
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = (vel_pop * PREDATION_VELOTHRIX_WORM + lev_pop * PREDATION_LEVIATHAN_WORM) * (0.3 + trait * 0.7)
            # Sexual selection for brightness
            sex_sel_bonus = trait * 0.01
            growth = GROWTH_RATES[s] + sex_sel_bonus
            sel_pressure = SELECTION_STRENGTH * 0.2  # sexual sel pushes up
            predator_count = vel_pop + lev_pop
            if predator_count > 10:
                sel_pressure -= SELECTION_STRENGTH * 0.3 * (predator_count / max(1, BASE_K[VELOTHRIX] + BASE_K[LEVIATHAN]))

        # ── POPULATION DYNAMICS (logistic) ──
        if s != LEVIATHAN:
            # Apply predation
            pop = max(0, pop - int(predation_loss * pop))

        if k <= 0:
            k = 1
        dpop = growth * pop * (1.0 - pop / k)
        new_pop = max(0, int(pop + dpop + random.uniform(-0.5, 0.5)))

        # Stochastic extinction for very small populations
        if 0 < new_pop <= 2 and random.random() < 0.05:
            new_pop = 0

        tile['pops'][s] = min(new_pop, int(k * 1.5))  # hard cap

        # ── TRAIT EVOLUTION ──
        if tile['pops'][s] > 0:
            # Selection
            new_trait = trait + sel_pressure

            # Drift (inversely proportional to sqrt(pop))
            if tile['pops'][s] > 0:
                drift = random.gauss(0, DRIFT_STRENGTH / math.sqrt(max(1, tile['pops'][s])))
                new_trait += drift

            # Mutation
            if random.random() < MUTATION_RATE * tile['pops'][s]:
                new_trait += random.gauss(0, MUTATION_STEP)

            # Clamp to 0-1
            tile['traits'][s] = max(0.0, min(1.0, new_trait))

            # Update variance (simplified)
            tile['trait_var'][s] = max(0.001, tile['trait_var'][s] * 0.99 + MUTATION_RATE * 0.01)

def _migrate():
    """Species migrate between adjacent tiles."""
    # Build migration deltas first, apply after
    deltas = [[{s: 0 for s in range(NUM_SPECIES)} for _ in range(GRID_SIZE)] for _ in range(GRID_SIZE)]

    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            tile = grid[r][c]
            neighbors = []
            for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                nr, nc = r+dr, c+dc
                if 0 <= nr < GRID_SIZE and 0 <= nc < GRID_SIZE:
                    neighbors.append((nr, nc))

            if not neighbors:
                continue

            for s in range(NUM_SPECIES):
                pop = tile['pops'][s]
                if pop < 3:
                    continue

                k = BASE_K[s] * habitat_suitability(tile['elevation'], s)
                if k <= 0:
                    continue

                # Migrate when over capacity
                pressure = pop / k
                if pressure < 0.7:
                    continue

                migrants = max(0, int(pop * MIGRATION_RATE * (pressure - 0.5)))
                if migrants <= 0:
                    continue

                # Distribute among neighbors based on suitability
                suits = []
                for nr, nc in neighbors:
                    ns = habitat_suitability(grid[nr][nc]['elevation'], s)
                    npop = grid[nr][nc]['pops'][s]
                    nk = BASE_K[s] * ns
                    if nk > 0 and npop < nk:
                        suits.append((nr, nc, ns * (1 - npop/nk)))
                    else:
                        suits.append((nr, nc, 0))

                total_suit = sum(x[2] for x in suits)
                if total_suit <= 0:
                    continue

                actual_migrants = min(migrants, pop // 4)  # Never migrate more than 25%
                deltas[r][c][s] -= actual_migrants

                for nr, nc, su in suits:
                    share = int(actual_migrants * su / total_suit)
                    deltas[nr][nc][s] += share

    # Apply deltas
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            for s in range(NUM_SPECIES):
                grid[r][c]['pops'][s] = max(0, grid[r][c]['pops'][s] + deltas[r][c][s])

# Track trait divergence for speciation
trait_divergence_counter = {}

def _check_speciation():
    """Check if any species has diverged enough to speciate."""
    for s in range(NUM_SPECIES):
        # Collect traits across all tiles with population
        traits_by_tile = []
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                if grid[r][c]['pops'][s] > 5:
                    traits_by_tile.append((r, c, grid[r][c]['traits'][s]))

        if len(traits_by_tile) < 4:
            continue

        # Find max trait difference
        trait_vals = [t[2] for t in traits_by_tile]
        max_diff = max(trait_vals) - min(trait_vals)

        key = f"species_{s}"
        if max_diff > SPECIATION_THRESHOLD:
            trait_divergence_counter[key] = trait_divergence_counter.get(key, 0) + 50  # we check every 50 gens
            if trait_divergence_counter[key] >= SPECIATION_GENS:
                names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
                trait_names = ['crest brightness', 'hunting range', 'burrowing depth', 'shell thickness', 'glow intensity']
                # Find where the split is
                sorted_traits = sorted(traits_by_tile, key=lambda x: x[2])
                low_region = sorted_traits[0]
                high_region = sorted_traits[-1]
                events_buffer.append({
                    'gen': generation,
                    'text': f'{names[s]} population split detected — variant near ({low_region[0]},{low_region[1]}) has {trait_names[s]} {low_region[2]:.2f} vs ({high_region[0]},{high_region[1]}) at {high_region[2]:.2f}'
                })
                trait_divergence_counter[key] = 0  # Reset to avoid spam
        else:
            trait_divergence_counter[key] = 0

    # Also check for population surges/crashes
    for s in range(NUM_SPECIES):
        total = sum(grid[r][c]['pops'][s] for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        expected = sum(BASE_K[s] * habitat_suitability(grid[r][c]['elevation'], s) * 0.5
                      for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
        if expected > 0:
            ratio = total / expected
            if ratio > 2.0:
                events_buffer.append({
                    'gen': generation,
                    'text': f'{names[s]} population surge — {total} individuals ({ratio:.1f}x expected)'
                })
            elif ratio < 0.2 and total > 0:
                events_buffer.append({
                    'gen': generation,
                    'text': f'{names[s]} population critically low — only {total} individuals remain'
                })

# ── API FUNCTIONS (called from JS) ──

def get_global_pop(species_idx):
    total = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            total += grid[r][c]['pops'][species_idx]
    return total

def get_global_trait(species_idx):
    total_trait = 0.0
    total_pop = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                total_trait += grid[r][c]['traits'][species_idx] * p
                total_pop += p
    if total_pop == 0:
        return 0.5
    return total_trait / total_pop

def get_tile_pop(r, c, species_idx):
    return grid[r][c]['pops'][species_idx]

def get_tile_trait(r, c, species_idx):
    return grid[r][c]['traits'][species_idx]

def get_map_data(species_idx):
    pops = []
    elevations = []
    max_pop = 1
    for r in range(GRID_SIZE):
        pop_row = []
        elev_row = []
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            pop_row.append(p)
            elev_row.append(grid[r][c]['elevation'])
            if p > max_pop:
                max_pop = p
        pops.append(pop_row)
        elevations.append(elev_row)
    return json.dumps({'pops': pops, 'elevations': elevations, 'max_pop': max_pop})

def get_trait_histogram(species_idx):
    """Return histogram of trait values across all tiles (weighted by pop)."""
    num_bins = 20
    bins = [0] * num_bins
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                t = grid[r][c]['traits'][species_idx]
                bin_idx = min(num_bins - 1, int(t * num_bins))
                bins[bin_idx] += p
    result = []
    for i in range(num_bins):
        result.append({'low': i/num_bins, 'high': (i+1)/num_bins, 'count': bins[i]})
    return json.dumps(result)

def get_and_clear_events():
    global events_buffer
    out = json.dumps(events_buffer)
    events_buffer = []
    return out
